name: Python Tests

on:
  push:
    branches: [main]
    paths: ['packages/rebus-generator/**', 'tests/**', 'tools/scripts/**']
  pull_request:
    paths: ['packages/rebus-generator/**', 'tests/**', 'tools/scripts/**']
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: packages/rebus-generator/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r packages/rebus-generator/requirements.txt
          pip install pytest

      - name: Run tests
        run: python -m pytest tests/ -v
