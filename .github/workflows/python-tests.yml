name: Python Tests

on:
  push:
    branches: [main]
    paths: ['packages/rebus-generator/**', 'tests/**', 'tools/scripts/**']
  pull_request:
    paths: ['packages/rebus-generator/**', 'tests/**', 'tools/scripts/**']
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run tests
        run: uv run pytest tests/ -v
