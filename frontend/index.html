<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#2563eb">
  <meta name="description" content="Rebusuri românești interactive">
  <link rel="apple-touch-icon" href="/generator-rebus/apple-touch-icon-180x180.png">
  <title>Rebus Românesc</title>
  <link rel="stylesheet" href="/src/styles/main.css">
  <link rel="stylesheet" href="/src/styles/grid.css">
  <link rel="stylesheet" href="/src/styles/gamification.css">
  <link rel="stylesheet" href="/src/styles/responsive.css">
</head>
<body>
  <div id="app">
    <header>
      <div class="header-row">
        <h1>Rebus Românesc</h1>
        <div class="header-points" id="header-points" title="Punctele tale"></div>
      </div>
      <p id="puzzle-title" class="subtitle"></p>
      <nav class="nav-tabs" id="nav-tabs">
        <button class="nav-tab nav-tab--active" data-tab="puzzles">Rebusuri</button>
        <button class="nav-tab" data-tab="stats">Profil</button>
      </nav>
    </header>

    <main>
      <!-- Puzzle selector -->
      <div id="puzzle-selector" class="panel">
        <div id="puzzle-list" class="puzzle-list">
          <p class="loading">Se încarcă...</p>
        </div>
      </div>

      <!-- Stats / Profile panel -->
      <div id="stats-panel" class="panel hidden"></div>

      <!-- Puzzle view -->
      <div id="puzzle-view" class="puzzle-view hidden">
        <button id="btn-back" class="btn-back" title="Înapoi la lista de rebusuri">←</button>
        <div class="puzzle-layout">
          <div class="grid-container">
            <!-- Active definition bar -->
            <div id="definition-bar" class="definition-bar definition-bar--empty"></div>
            <div id="grid" class="grid"></div>
            <div class="toolbar">
              <button id="btn-check" class="btn btn-hint" title="Verifică răspunsurile">
                <span class="btn-hint__label">Verifică</span>
                <span class="btn-hint__cost" id="check-cost"></span>
              </button>
              <button id="btn-hint-letter" class="btn btn-hint" title="Arată litera selectată">
                <span class="btn-hint__label">Literă</span>
                <span class="btn-hint__cost" id="hint-letter-cost"></span>
              </button>
              <button id="btn-hint-word" class="btn btn-hint" title="Arată cuvântul selectat">
                <span class="btn-hint__label">Cuvânt</span>
                <span class="btn-hint__cost" id="hint-word-cost"></span>
              </button>

            </div>
          </div>
          <div class="clues-container">
            <div class="clue-section">
              <h3>Orizontal</h3>
              <ol id="clues-horizontal" class="clue-list"></ol>
            </div>
            <div class="clue-section">
              <h3>Vertical</h3>
              <ol id="clues-vertical" class="clue-list"></ol>
            </div>
          </div>
        </div>
      </div>

      <!-- Completion modal -->
      <div id="completion-modal" class="modal hidden">
        <div class="modal-content">
          <h2>Felicitări!</h2>
          <div id="completion-details"></div>
          <button id="btn-close-modal" class="btn">OK</button>
        </div>
      </div>

      <!-- Toast notifications -->
      <div id="toast-container" class="toast-container"></div>
    </main>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
