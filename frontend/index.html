<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#2563eb">
  <meta name="description" content="Rebusuri românești interactive">
  <link rel="apple-touch-icon" href="/generator-rebus/apple-touch-icon-180x180.png">
  <title>Rebus</title>
  <link rel="stylesheet" href="/src/styles/main.css">
  <link rel="stylesheet" href="/src/styles/grid.css">
  <link rel="stylesheet" href="/src/styles/gamification.css">
  <link rel="stylesheet" href="/src/styles/responsive.css">
</head>
<body>
  <div id="app">
    <header>
      <div class="header-row">
        <h1>Rebus</h1>
        <div class="header-points" id="header-points" title="Punctele tale"></div>
        <button id="btn-back" class="btn-back hidden" title="Înapoi la lista de rebusuri">&lt;&lt;</button>
      </div>
      <p id="puzzle-title" class="subtitle"></p>
      <p id="puzzle-meta" class="puzzle-meta hidden"></p>
      <nav class="nav-tabs" id="nav-tabs" aria-label="Navigare principală"></nav>
    </header>

    <main>
      <!-- Puzzle selector -->
      <div id="puzzle-selector" class="panel selector-panel">
        <div id="selector-controls" class="selector-controls"></div>
        <div id="puzzle-list" class="puzzle-list">
          <p class="loading">Se încarcă...</p>
        </div>
      </div>

      <!-- Stats / Profile panel -->
      <div id="stats-panel" class="panel hidden"></div>

      <!-- Puzzle view -->
      <div id="puzzle-view" class="puzzle-view hidden">
        <div class="puzzle-layout">
          <div class="grid-container">
            <!-- Active definition bar -->
            <div id="definition-bar" class="definition-bar definition-bar--empty" aria-live="polite"></div>
            <span id="progress-counter" class="progress-counter"></span>
            <div id="grid" class="grid" role="grid" aria-label="Grilă rebus"></div>
            <div class="toolbar">
              <button id="btn-check" class="btn btn-hint" title="Verifică răspunsurile">
                <span class="btn-hint__label">Verifică</span>
                <span class="btn-hint__cost" id="check-cost"></span>
              </button>
              <button id="btn-hint-letter" class="btn btn-hint" title="Arată litera selectată">
                <span class="btn-hint__label">Literă</span>
                <span class="btn-hint__cost" id="hint-letter-cost"></span>
              </button>
              <button id="btn-hint-word" class="btn btn-hint" title="Arată cuvântul selectat">
                <span class="btn-hint__label">Cuvânt</span>
                <span class="btn-hint__cost" id="hint-word-cost"></span>
              </button>
              <button
                id="btn-pencil"
                class="btn btn-pencil"
                type="button"
                title="Marchează literele noi ca tentative"
                aria-label="Creion oprit. Marchează literele noi ca tentative."
                aria-pressed="false"
              >
                <span class="btn-pencil__icon" aria-hidden="true">✏️</span>
                <span class="btn-pencil__label">Creion</span>
                <span class="btn-pencil__state">Oprit</span>
              </button>
            </div>
            <div id="touch-remote" class="touch-remote hidden" aria-label="Telecomandă rebus">
              <div class="touch-remote__row touch-remote__row--top">
                <button class="touch-remote__key" type="button" data-remote-action="key" data-key="Q">Q</button>
                <button class="touch-remote__key" type="button" data-remote-action="key" data-key="W">W</button>
                <button class="touch-remote__key" type="button" data-remote-action="key" data-key="E">E</button>
                <button class="touch-remote__key" type="button" data-remote-action="key" data-key="R">R</button>
                <button class="touch-remote__key" type="button" data-remote-action="key" data-key="T">T</button>
                <button class="touch-remote__key" type="button" data-remote-action="key" data-key="Y">Y</button>
                <button class="touch-remote__key" type="button" data-remote-action="key" data-key="U">U</button>
                <button class="touch-remote__key" type="button" data-remote-action="key" data-key="I">I</button>
                <button class="touch-remote__key" type="button" data-remote-action="key" data-key="O">O</button>
                <button class="touch-remote__key" type="button" data-remote-action="key" data-key="P">P</button>
              </div>
              <div class="touch-remote__row touch-remote__row--middle">
                <button class="touch-remote__key" type="button" data-remote-action="key" data-key="A">A</button>
                <button class="touch-remote__key" type="button" data-remote-action="key" data-key="S">S</button>
                <button class="touch-remote__key" type="button" data-remote-action="key" data-key="D">D</button>
                <button class="touch-remote__key" type="button" data-remote-action="key" data-key="F">F</button>
                <button class="touch-remote__key" type="button" data-remote-action="key" data-key="G">G</button>
                <button class="touch-remote__key" type="button" data-remote-action="key" data-key="H">H</button>
                <button class="touch-remote__key" type="button" data-remote-action="key" data-key="J">J</button>
                <button class="touch-remote__key" type="button" data-remote-action="key" data-key="K">K</button>
                <button class="touch-remote__key" type="button" data-remote-action="key" data-key="L">L</button>
              </div>
              <div class="touch-remote__row touch-remote__row--bottom">
                <button
                  id="touch-remote-direction"
                  class="touch-remote__key touch-remote__key--direction"
                  type="button"
                  data-remote-action="direction"
                  aria-label="Direcție activă: orizontală"
                  title="Schimbă orientarea definiției"
                >
                  <span class="touch-remote__direction-icon" aria-hidden="true">
                    <span class="touch-remote__arrow touch-remote__arrow--up">↑</span>
                    <span class="touch-remote__arrow touch-remote__arrow--right">→</span>
                    <span class="touch-remote__arrow touch-remote__arrow--down">↓</span>
                    <span class="touch-remote__arrow touch-remote__arrow--left">←</span>
                    <span class="touch-remote__direction-core"></span>
                  </span>
                </button>
                <button class="touch-remote__key" type="button" data-remote-action="key" data-key="Z">Z</button>
                <button class="touch-remote__key" type="button" data-remote-action="key" data-key="X">X</button>
                <button class="touch-remote__key" type="button" data-remote-action="key" data-key="C">C</button>
                <button class="touch-remote__key" type="button" data-remote-action="key" data-key="V">V</button>
                <button class="touch-remote__key" type="button" data-remote-action="key" data-key="B">B</button>
                <button class="touch-remote__key" type="button" data-remote-action="key" data-key="N">N</button>
                <button class="touch-remote__key" type="button" data-remote-action="key" data-key="M">M</button>
                <button
                  id="touch-remote-delete"
                  class="touch-remote__key touch-remote__key--delete"
                  type="button"
                  data-remote-action="delete"
                  aria-label="Backspace. Revine la pătratul precedent și șterge."
                  title="Backspace"
                >
                  ⌫
                </button>
              </div>
            </div>
          </div>
          <div class="clues-container">
            <div class="clue-section">
              <h3>Orizontal</h3>
              <ol id="clues-horizontal" class="clue-list" aria-label="Indicii orizontale"></ol>
            </div>
            <div class="clue-section">
              <h3>Vertical</h3>
              <ol id="clues-vertical" class="clue-list" aria-label="Indicii verticale"></ol>
            </div>
          </div>
        </div>
      </div>

      <!-- Completion modal -->
      <div id="completion-modal" class="modal hidden">
        <div class="modal-content">
          <h2>Felicitări!</h2>
          <div id="completion-details"></div>
          <button id="btn-close-modal" class="btn">OK</button>
        </div>
      </div>

      <!-- Toast notifications -->
      <div id="toast-container" class="toast-container"></div>
    </main>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
